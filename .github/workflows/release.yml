name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v2.0.0"
        required: true
        type: string

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

      - name: Submit Firefox extension to AMO
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          bunx web-ext sign \
            --source-dir dist/ggdeals-extension-firefox \
            --artifacts-dir dist/amo \
            --channel=listed \
            --amo-metadata extension/amo-metadata.json \
            --upload-source-code dist/ggdeals-steam-companion-source.zip \
            --approval-timeout=0 \
            --no-input \
            --api-key="$AMO_JWT_ISSUER" \
            --api-secret="$AMO_JWT_SECRET"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            userscript.user.js
            dist/ggdeals-steam-companion-chrome.zip
            dist/ggdeals-steam-companion-firefox.zip
            dist/ggdeals-steam-companion-source.zip
