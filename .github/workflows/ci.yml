name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

      - name: Upload userscript artifact
        uses: actions/upload-artifact@v4
        with:
          name: ggdeals-steam-companion-userscript
          path: userscript.user.js

      - name: Upload Chrome extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: ggdeals-steam-companion-chrome
          path: |
            dist/ggdeals-extension
            dist/ggdeals-steam-companion-chrome.zip
